<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>电镀ERP V1.0</title>


<style>

:root{
--bg:#f5f5f7;
--card:rgba(255,255,255,.75);
--text:#1d1d1f;
--sub:#86868b;
--blue:#007aff;
}


.dark{
--bg:#000;
--card:#1c1c1e;
--text:#fff;
--sub:#aaa;
}


*{
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
"PingFang SC",
Arial;
}


body{

margin:0;

background:var(--bg);

color:var(--text);

padding-bottom:80px;

}



header{

padding:30px 20px 10px;

}


header h1{

font-size:32px;

margin:0;

}


header p{

color:var(--sub);

}



/* 卡片 */

.card{

background:var(--card);

backdrop-filter:blur(20px);

border-radius:24px;

margin:15px;

padding:20px;

}



/* 数据 */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}


.box{

background:var(--card);

border-radius:20px;

padding:15px;

}


.box span{

color:var(--sub);

}


.box h2{

font-size:30px;

margin:8px 0;

}



/* 底部 */

.nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:70px;

display:flex;

justify-content:space-around;

align-items:center;

background:rgba(255,255,255,.8);

backdrop-filter:blur(20px);

}



.dark .nav{

background:#111;

}



.item{

text-align:center;

font-size:13px;

color:var(--sub);

cursor:pointer;

}


.item b{

display:block;

font-size:24px;

}


.active{

color:var(--blue);

}



button{

background:#007aff;

color:white;

border:0;

padding:12px 20px;

border-radius:15px;

margin-top:10px;

}



input, select{

border:none;

background:var(--card);

color:var(--text);

padding:12px;

margin-top:10px;

border-radius:12px;

width:100%;

box-sizing:border-box;

}



</style>

</head>


<body>



<div id="home">

<header>

<h1>电镀ERP</h1>

<p>收发存 · 外协管理系统</p>

</header>



<div class="grid">


<div class="box">

<span>今日入库</span>

<h2 id="in">0</h2>

</div>


<div class="box">

<span>今日出库</span>

<h2 id="out">0</h2>

</div>


<div class="box">

<span>库存数量</span>

<h2 id="stock">0</h2>

</div>


<div class="box">

<span>外协在外</span>

<h2 id="wx">0</h2>

</div>


</div>




<div class="card">

<h3>
系统状态
</h3>


<p>
数据保存于本机
</p>


<button onclick="darkMode()">

深色模式

</button>


</div>




<div class="card">

<h3>
最近操作
</h3>


<div id="log">

暂无记录

</div>


</div>

</div>




<div id="flow" style="display:none">

<header>

<h1>
收发管理
</h1>

<p>
入库 / 出库
</p>

</header>



<div class="card">

<h3>
入库
</h3>


<select id="inMaterial"
style="width:100%;padding:12px">
</select>


<input id="inQty"
type="number"
placeholder="数量"
style="width:100%;padding:12px;margin-top:10px">


<button onclick="stockIn()">

确认入库

</button>


</div>




<div class="card">

<h3>
出库
</h3>


<select id="outMaterial"
style="width:100%;padding:12px">
</select>


<input id="outQty"
type="number"
placeholder="数量"
style="width:100%;padding:12px;margin-top:10px">


<button onclick="stockOut()">

确认出库

</button>


</div>




<div class="card">

<h3>
库存流水
</h3>


<div id="records"></div>


</div>


</div>




<div id="outsource"
style="display:none">


<header>

<h1>
外协管理
</h1>

<p>
外协发出与收回
</p>

</header>



<div class="card">

<h3>
外协发出
</h3>


<select id="wxMaterial"
style="width:100%;padding:12px">
</select>


<select id="wxFactory"
style="width:100%;padding:12px;margin-top:10px">
</select>



<input id="wxQty"
type="number"
placeholder="数量"
style="width:100%;padding:12px;margin-top:10px">



<button onclick="sendOutsource()">

发出

</button>


</div>




<div class="card">

<h3>
外协收回
</h3>


<select id="backOrder"
style="width:100%;padding:12px">

</select>


<input id="backQty"
type="number"
placeholder="收回数量"
style="width:100%;padding:12px;margin-top:10px">


<button onclick="receiveOutsource()">

收回

</button>


</div>




<div class="card">


<h3>
外协在外记录
</h3>


<div id="wxRecords">

</div>


</div>


</div>




<div id="inventoryPage" style="display:none">

<header>

<h1>
库存中心
</h1>

<p>
实时库存与预警
</p>

</header>



<div class="card">

<input 
id="stockSearch"
placeholder="搜索物料"
oninput="renderInventory()"
style="width:100%;padding:12px;border-radius:12px">

</div>



<div class="card">

<h3>
库存列表
</h3>

<div id="inventoryList">

</div>

</div>




<div class="card">

<h3>
库存统计
</h3>

<div id="stockReport">

</div>

</div>

</div>




<div id="reportPage" style="display:none">

<header>

<h1>
查询报表
</h1>

<p>
收发存数据分析
</p>

</header>



<div class="card">

<input 
id="reportKeyword"
placeholder="输入物料名称搜索"
oninput="renderReport()"
style="width:100%;padding:12px;border-radius:12px">

</div>



<div class="card">

<h3>
收发记录
</h3>

<div id="reportList">

</div>

</div>



<div class="card">

<h3>
数据导出
</h3>

<button onclick="exportCSV()">

导出Excel

</button>

</div>

</div>




<div class="nav">


<div class="item active" onclick="showPage('home')">

<b>⌂</b>

首页

</div>


<div class="item" onclick="showPage('flow')">

<b>⇅</b>

收发

</div>


<div class="item" onclick="showPage('inventoryPage')">

<b>▣</b>

库存

</div>


<div class="item" onclick="showPage('outsource')">

<b>↔</b>

外协

</div>


<div class="item" onclick="showPage('reportPage')">

<b>▤</b>

报表

</div>


</div>




<script>


// 数据中心

let DB = JSON.parse(

localStorage.getItem(
"platingERP"
)

)

||{

materials:[],

suppliers:[],

outsources:[],

inventory:[],

records:[],

outsourceOrders:[],

logs:[]

};




function save(){

localStorage.setItem(

"platingERP",

JSON.stringify(DB)

);

}




function darkMode(){

document.body.classList.toggle(
"dark"
);

}




function refresh(){


document.getElementById(
"stock"
).innerHTML=

DB.inventory.reduce((sum,x)=>sum+x.qty,0);



document.getElementById(
"wx"
).innerHTML=

DB.outsourceOrders
.reduce((sum,x)=>sum+(x.send-x.back),0);



}


refresh();



function showPage(id){

document.querySelectorAll(
"body>div[id]"
)
.forEach(
x=>{
x.style.display="none";
}
);


document.getElementById(id)
.style.display="block";


}



//生成单号

function orderNo(type){

let d=new Date();

return type+
d.getFullYear()
+
(d.getMonth()+1)
+
d.getDate()
+
Math.floor(Math.random()*9000+1000);

}




//刷新物料选择

function loadMaterialSelect(){

let html="<option value=''>选择物料</option>";

DB.materials.forEach(x=>{

html+=`

<option value="${x.id}">
${x.name}
</option>

`;

});


document.getElementById(
"inMaterial"
).innerHTML=html;


document.getElementById(
"outMaterial"
).innerHTML=html;

document.getElementById(
"wxMaterial"
).innerHTML=html;


}




//入库

function stockIn(){


let id=
document.getElementById(
"inMaterial"
).value;


let qty=
Number(
document.getElementById(
"inQty"
).value
);


if(!id || !qty){
alert("请选择物料和输入数量");
return;
}


let item=
DB.inventory.find(
x=>x.id==id
);



if(item){

item.qty+=qty;

}else{

DB.inventory.push({

id:id,

qty:qty

});

}



DB.records.push({

no:orderNo("RK"),

type:"入库",

id:id,

qty:qty,

time:new Date().toLocaleString()

});



DB.logs.push(
"入库 "+qty
);


save();

refresh();

showRecords();

refreshInventory();

document.getElementById("inMaterial").value="";

document.getElementById("inQty").value="";

}





//出库

function stockOut(){


let id=
document.getElementById(
"outMaterial"
).value;


let qty=
Number(
document.getElementById(
"outQty"
).value
);


if(!id || !qty){
alert("请选择物料和输入数量");
return;
}


let item=
DB.inventory.find(
x=>x.id==id
);



if(!item || item.qty<qty){

alert("库存不足");

return;

}



item.qty-=qty;



DB.records.push({

no:orderNo("CK"),

type:"出库",

id:id,

qty:qty,

time:new Date().toLocaleString()

});


DB.logs.push(
"出库 "+qty
);


save();

refresh();

showRecords();

refreshInventory();

document.getElementById("outMaterial").value="";

document.getElementById("outQty").value="";

}




function showRecords(){


let html="";


DB.records
.slice()
.reverse()
.forEach(x=>{


html+=`

<p>

${x.no}

<br>

${x.type}

数量:${x.qty}

<br>

${x.time}

</p>

<hr>

`;

});


document.getElementById(
"records"
).innerHTML=html;


}



// 外协单号

function wxNo(){

return "WX"
+
Date.now();

}



//加载外协资料

function loadWxData(){


let m="<option value=''>选择物料</option>";


DB.materials.forEach(x=>{

m+=`

<option value="${x.id}">
${x.name}
</option>

`;

});


document.getElementById("wxMaterial").innerHTML=m;



let f="<option value=''>选择厂家</option>";


DB.outsources.forEach(x=>{

f+=`

<option value="${x.id}">
${x.name}
</option>

`;

});


document.getElementById("wxFactory").innerHTML=f;



}




//外协发出

function sendOutsource(){


let mid=
document.getElementById("wxMaterial").value;


let fid=
document.getElementById("wxFactory").value;


let qty=
Number(document.getElementById("wxQty").value);


if(!mid || !fid || !qty){
alert("请选择物料、厂家和输入数量");
return;
}


let stock=
DB.inventory.find(
x=>x.id==mid
);



if(!stock || stock.qty<qty){

alert("库存不足");

return;

}



stock.qty-=qty;



DB.outsourceOrders.push({

no:wxNo(),

material:mid,

factory:fid,

send:qty,

back:0,

time:new Date().toLocaleString()

});



DB.records.push({

type:"外协发出",

qty:qty

});



save();


refresh();

refreshWx();

document.getElementById("wxMaterial").value="";

document.getElementById("wxFactory").value="";

document.getElementById("wxQty").value="";

}



//外协收回

function receiveOutsource(){


let index=
document.getElementById("backOrder").value;


let qty=
Number(document.getElementById("backQty").value);


if(!qty || index===""){
alert("请选择订单和输入数量");
return;
}


let order=
DB.outsourceOrders[index];


if(!order)return;


let remain=order.send-order.back;

if(qty>remain){
alert("收回数量超过在外数量");
return;
}


order.back+=qty;



let stock=
DB.inventory.find(
x=>x.id==order.material
);



if(stock){

stock.qty+=qty;

}else{

DB.inventory.push({

id:order.material,

qty:qty

});

}



DB.records.push({

type:"外协收回",

qty:qty

});


save();


refresh();

refreshInventory();

refreshWx();

document.getElementById("backQty").value="";

}




function refreshWx(){


let html="";



DB.outsourceOrders.forEach(
(x,i)=>{


let remain=
x.send-x.back;


html+=`

<p>

单号:${x.no}

<br>

发出:${x.send}

<br>

收回:${x.back}

<br>

在外:${remain}

</p>

<hr>

`;



});



document.getElementById("wxRecords").innerHTML=html;



let opt="<option value=''>选择订单</option>";


DB.outsourceOrders.forEach(
(x,i)=>{


if(x.send-x.back>0){

opt+=`

<option value="${i}">
${x.no}
剩余:${x.send-x.back}

</option>

`;

}


});


document.getElementById("backOrder").innerHTML=opt;



}



// 获取物料名称

function materialName(id){

let m=
DB.materials.find(
x=>x.id==id
);


return m?
m.name:
"未知物料";

}




//库存显示

function renderInventory(){


let key=
document.getElementById(
"stockSearch"
)?
.value
.toLowerCase()
:
"";



let html="";



DB.inventory.forEach(x=>{


let name=
materialName(x.id);



if(
key &&
!name.toLowerCase().includes(key)
)
return;



let m=
DB.materials.find(
a=>a.id==x.id
);



let safe=
m&&m.safe?
m.safe:
0;



let warn=
x.qty<=safe;



html+=`

<div>

<h3>

${name}

</h3>


<p>

库存数量：

${x.qty}

</p>


<p>

安全库存：

${safe}

</p>



${
warn
?
"<b style='color:red'>⚠ 库存不足</b>"
:
"<b style='color:#007aff'>正常</b>"
}


</div>

<hr>

`;



});



document.getElementById(
"inventoryList"
).innerHTML=
html||
"暂无库存";



}




//统计

function stockStatistics(){


let total=0;


DB.inventory.forEach(
x=>{

total+=Number(x.qty);

});



document.getElementById(
"stockReport"
).innerHTML=

`

<p>
物料种类：
${DB.inventory.length}
</p>

<p>
库存总数量：
${total}
</p>

`;

}



function refreshInventory(){

renderInventory();

stockStatistics();

}



// 查询报表

function renderReport(){


let key=
document.getElementById(
"reportKeyword"
)?
.value
.toLowerCase()
:
"";


let html="";



DB.records
.slice()
.reverse()
.forEach(x=>{


let name=
materialName(x.id);



if(
key &&
!name.toLowerCase().includes(key)
)
return;



html+=`

<div>

<p>

单号：
${x.no||""}

</p>


<p>

类型：
${x.type}

</p>


<p>

物料：
${name}

</p>


<p>

数量：
${x.qty||0}

</p>


<p>

时间：
${x.time||""}

</p>


</div>

<hr>

`;



});



document.getElementById(
"reportList"
).innerHTML=

html||"暂无记录";



}



// Excel 导出

function exportCSV(){


let csv=
"单号,类型,物料,数量,时间\n";



DB.records.forEach(x=>{


csv+=

`${x.no||""},${x.type},${materialName(x.id)},${x.qty||0},${x.time||""}\n`;



});



let blob=
new Blob(
[csv],
{
type:"text/csv;charset=utf-8;"
}
);



let url=
URL.createObjectURL(blob);



let a=
document.createElement("a");


a.href=url;

a.download=
"电镀ERP收发存报表.csv";


a.click();


}



// 首页统计

function dashboard(){

let inCount=0;

let outCount=0;


DB.records.forEach(x=>{


if(x.type=="入库")
inCount+=Number(x.qty);


if(x.type=="出库")
outCount+=Number(x.qty);



});



document.getElementById("in").innerHTML=
inCount;


document.getElementById("out").innerHTML=
outCount;



}



loadMaterialSelect();

loadWxData();

showRecords();

refreshWx();

refreshInventory();

renderReport();

dashboard();

</script>



</body>

</html>
