<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>电镀ERP V1.0</title>


<style>

:root{
--bg:#f5f5f7;
--card:rgba(255,255,255,.75);
--text:#1d1d1f;
--sub:#86868b;
--blue:#007aff;
}


.dark{
--bg:#000;
--card:#1c1c1e;
--text:#fff;
--sub:#aaa;
}


*{
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
"PingFang SC",
Arial;
}


body{

margin:0;

background:var(--bg);

color:var(--text);

padding-bottom:80px;

}



header{

padding:30px 20px 10px;

}


header h1{

font-size:32px;

margin:0;

}


header p{

color:var(--sub);

}



/* 卡片 */

.card{

background:var(--card);

backdrop-filter:blur(20px);

border-radius:24px;

margin:15px;

padding:20px;

}



/* 数据 */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}


.box{

background:var(--card);

border-radius:20px;

padding:15px;

}


.box span{

color:var(--sub);

}


.box h2{

font-size:30px;

margin:8px 0;

}



/* 底部 */

.nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:70px;

display:flex;

justify-content:space-around;

align-items:center;

background:rgba(255,255,255,.8);

backdrop-filter:blur(20px);

}



.dark .nav{

background:#111;

}



.item{

text-align:center;

font-size:13px;

color:var(--sub);

}


.item b{

display:block;

font-size:24px;

}


.active{

color:var(--blue);

}



button{

background:#007aff;

color:white;

border:0;

padding:12px 20px;

border-radius:15px;

margin-top:10px;

}



input, select{

border:none;

background:var(--card);

color:var(--text);

padding:12px;

margin-top:10px;

border-radius:12px;

}



</style>

</head>


<body>



<header>

<h1>电镀ERP</h1>

<p>收发存 · 外协管���系统</p>

</header>



<div class="grid">


<div class="box">

<span>今日入库</span>

<h2 id="in">0</h2>

</div>


<div class="box">

<span>今日出库</span>

<h2 id="out">0</h2>

</div>


<div class="box">

<span>库存数量</span>

<h2 id="stock">0</h2>

</div>


<div class="box">

<span>外协在外</span>

<h2 id="wx">0</h2>

</div>


</div>




<div class="card">

<h3>
系统状态
</h3>


<p>
数据保存于本机
</p>


<button onclick="darkMode()">

深色模式

</button>


</div>




<div class="card">

<h3>
最近操作
</h3>


<div id="log">

暂无记录

</div>


</div>




<div id="flow" style="display:none">

<header>

<h1>
收发管理
</h1>

<p>
入库 / 出库
</p>

</header>



<div class="card">

<h3>
入库
</h3>


<select id="inMaterial"
style="width:100%;padding:12px">
</select>


<input id="inQty"
type="number"
placeholder="数量"
style="width:100%;padding:12px;margin-top:10px">


<button onclick="stockIn()">

确认入库

</button>


</div>




<div class="card">

<h3>
出库
</h3>


<select id="outMaterial"
style="width:100%;padding:12px">
</select>


<input id="outQty"
type="number"
placeholder="数量"
style="width:100%;padding:12px;margin-top:10px">


<button onclick="stockOut()">

确认出库

</button>


</div>




<div class="card">

<h3>
库存流水
</h3>


<div id="records"></div>


</div>


</div>




<div class="nav">


<div class="item active" onclick="showPage('home')">

<b>⌂</b>

首页

</div>


<div class="item" onclick="showPage('flow')">

<b>⇅</b>

收发

</div>


<div class="item">

<b>▣</b>

库存

</div>


<div class="item">

<b>↔</b>

外协

</div>


<div class="item">

<b>⚙</b>

设置

</div>


</div>




<script>


// 数据中心

let DB = JSON.parse(

localStorage.getItem(
"platingERP"
)

)

||{


materials:[],

inventory:[],

records:[],

logs:[]

};




function save(){

localStorage.setItem(

"platingERP",

JSON.stringify(DB)

);

}




function darkMode(){

document.body.classList.toggle(
"dark"
);

}




function refresh(){


document.getElementById(
"stock"
).innerHTML=

DB.inventory.length;



document.getElementById(
"wx"
).innerHTML=

DB.records.filter(
x=>x.type=="wx"
).length;



}


refresh();



function showPage(id){

document.querySelectorAll(
"body>div[id]"
)
.forEach(
x=>{
if(x.id=="flow" || x.id=="home") {
x.style.display="none";
}
}
);


if(id=="home"){

document.querySelector("header").parentElement.style.display="block";

}else if(id=="flow"){

document.getElementById("flow").style.display="block";

}


}



//生成单号

function orderNo(type){

let d=new Date();

return type+
d.getFullYear()
+
(d.getMonth()+1)
+
d.getDate()
+
Math.floor(Math.random()*9000+1000);

}




//刷新物料选择

function loadMaterialSelect(){

let html="<option value=''>选择物料</option>";

DB.materials.forEach(x=>{

html+=`

<option value="${x.id}">
${x.name}
</option>

`;

});


document.getElementById(
"inMaterial"
).innerHTML=html;


document.getElementById(
"outMaterial"
).innerHTML=html;

}




//入库

function stockIn(){


let id=
document.getElementById(
"inMaterial"
).value;


let qty=
Number(
document.getElementById(
"inQty"
).value
);


if(!id || !qty){
alert("请选择物料和输入数量");
return;
}


let item=
DB.inventory.find(
x=>x.id==id
);



if(item){

item.qty+=qty;

}else{

DB.inventory.push({

id:id,

qty:qty

});

}



DB.records.push({

no:orderNo("RK"),

type:"入库",

id:id,

qty:qty,

time:new Date().toLocaleString()

});



DB.logs.push(
"入库 "+qty
);


save();

refresh();

showRecords();

document.getElementById("inMaterial").value="";

document.getElementById("inQty").value="";

}





//出库

function stockOut(){


let id=
document.getElementById(
"outMaterial"
).value;


let qty=
Number(
document.getElementById(
"outQty"
).value
);


if(!id || !qty){
alert("请选择物料和输入数量");
return;
}


let item=
DB.inventory.find(
x=>x.id==id
);



if(!item || item.qty<qty){

alert("库存不足");

return;

}



item.qty-=qty;



DB.records.push({

no:orderNo("CK"),

type:"出库",

id:id,

qty:qty,

time:new Date().toLocaleString()

});


DB.logs.push(
"出库 "+qty
);


save();

refresh();

showRecords();

document.getElementById("outMaterial").value="";

document.getElementById("outQty").value="";

}




function showRecords(){


let html="";


DB.records
.slice()
.reverse()
.forEach(x=>{


html+=`

<p>

${x.no}

<br>

${x.type}

数量:${x.qty}

<br>

${x.time}

</p>

<hr>

`;

});


document.getElementById(
"records"
).innerHTML=html;


}



loadMaterialSelect();

showRecords();

</script>



</body>

</html>
