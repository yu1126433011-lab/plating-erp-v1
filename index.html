<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>电镀ERP V1.0</title>


<style>

:root{
--bg:#f5f5f7;
--card:rgba(255,255,255,.75);
--text:#1d1d1f;
--sub:#86868b;
--blue:#007aff;
}


.dark{
--bg:#000;
--card:#1c1c1e;
--text:#fff;
--sub:#aaa;
}


*{
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
"PingFang SC",
Arial;
}


body{

margin:0;

background:var(--bg);

color:var(--text);

padding-bottom:80px;

}



header{

padding:30px 20px 10px;

}


header h1{

font-size:32px;

margin:0;

}


header p{

color:var(--sub);

}



/* 卡片 */

.card{

background:var(--card);

backdrop-filter:blur(20px);

border-radius:24px;

margin:15px;

padding:20px;

}



/* 数据 */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}


.box{

background:var(--card);

border-radius:20px;

padding:15px;

}


.box span{

color:var(--sub);

}


.box h2{

font-size:30px;

margin:8px 0;

}



/* 底部 */

.nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:70px;

display:flex;

justify-content:space-around;

align-items:center;

background:rgba(255,255,255,.8);

backdrop-filter:blur(20px);

}



.dark .nav{

background:#111;

}



.item{

text-align:center;

font-size:13px;

color:var(--sub);

}


.item b{

display:block;

font-size:24px;

}


.active{

color:var(--blue);

}



button{

background:#007aff;

color:white;

border:0;

padding:12px 20px;

border-radius:15px;

}



input{

border:none;

background:var(--card);

color:var(--text);

margin-top:10px;

}



</style>

</head>


<body>



<header>

<h1>电镀ERP</h1>

<p>收发存 · 外协管理系统</p>

</header>



<div class="grid">


<div class="box">

<span>今日入库</span>

<h2 id="in">0</h2>

</div>


<div class="box">

<span>今日出库</span>

<h2 id="out">0</h2>

</div>


<div class="box">

<span>库存数量</span>

<h2 id="stock">0</h2>

</div>


<div class="box">

<span>外协在外</span>

<h2 id="wx">0</h2>

</div>


</div>




<div class="card">

<h3>
系统状态
</h3>


<p>
数据保存于本机
</p>


<button onclick="darkMode()">

深色模式

</button>


</div>




<div class="card">

<h3>
最近操作
</h3>


<div id="log">

暂无记录

</div>


</div>




<div id="basic"
style="display:none">


<header>

<h1>
基础资料
</h1>

<p>
物料与合作单位
</p>

</header>


<div class="card">


<h3>
新增物料
</h3>


<input id="mName"
placeholder="物料名称"
style="width:100%;padding:12px;border-radius:12px">


<input id="mSpec"
placeholder="规格型号"
style="width:100%;padding:12px;margin-top:10px;border-radius:12px">


<button onclick="addMaterial()">

保存物料

</button>


<div id="materialList">

</div>


</div>




<div class="card">


<h3>
外协厂家
</h3>


<input id="wxName"
placeholder="外协厂名称"
style="width:100%;padding:12px;border-radius:12px">


<button onclick="addWx()">

保存外协

</button>


<div id="wxList"></div>


</div>




<div class="card">


<h3>
供应商
</h3>


<input id="supName"
placeholder="供应商名称"
style="width:100%;padding:12px;border-radius:12px">


<button onclick="addSupplier()">

保存供应商

</button>


<div id="supList"></div>


</div>




</div>




<div class="nav">


<div class="item active">

<b>⌂</b>

首页

</div>


<div class="item">

<b>▣</b>

库存

</div>


<div class="item">

<b>↔</b>

外协

</div>


<div class="item" onclick="showPage('basic')">

<b>▤</b>

资料

</div>


<div class="item">

<b>⚙</b>

设置

</div>


</div>




<script>


// 数据中心

let DB = JSON.parse(

localStorage.getItem(
"platingERP"
)

)

||{


materials:[],

suppliers:[],

outsources:[],

inventory:[],

records:[],

logs:[]

};




function save(){

localStorage.setItem(

"platingERP",

JSON.stringify(DB)

);

}




function darkMode(){

document.body.classList.toggle(
"dark"
);

}




function refresh(){


document.getElementById(
"stock"
).innerHTML=

DB.inventory.length;



document.getElementById(
"wx"
).innerHTML=

DB.records.filter(
x=>x.type=="wx"
).length;



}


refresh();


function code(prefix){

return prefix+
Date.now();

}



//新增物料

function addMaterial(){

let name =
document.getElementById(
"mName"
).value;


let spec =
document.getElementById(
"mSpec"
).value;


if(!name)return;


DB.materials.push({

id:code("WL"),

name:name,

spec:spec

});


save();

showBasic();

}



//新增外协

function addWx(){

let name=
document.getElementById(
"wxName"
).value;


if(!name)return;


DB.outsources.push({

id:code("WX"),

name:name

});


save();

showBasic();

}



//供应商

function addSupplier(){

let name=
document.getElementById(
"supName"
).value;


if(!name)return;


DB.suppliers.push({

id:code("GY"),

name:name

});


save();

showBasic();

}




function showBasic(){


document.getElementById(
"materialList"
).innerHTML=

DB.materials.map(

(x,i)=>

`
<p>
${x.id}
<br>
${x.name}
${x.spec||""}

</p>
`

).join("");




document.getElementById(
"wxList"
).innerHTML=

DB.outsources.map(

x=>`<p>${x.name}</p>`

).join("");




document.getElementById(
"supList"
).innerHTML=

DB.suppliers.map(

x=>`<p>${x.name}</p>`

).join("");



}



function showPage(id){

document.querySelectorAll(
"body>div"
)
.forEach(
x=>x.style.display="none"
);


document.getElementById(id)
.style.display="block";


}



showBasic();

</script>



</body>

</html>
